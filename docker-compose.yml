version: "3.9"
services:
  fastapi:
    build: .
    container_name: fastapi
    restart: always
    expose:
      - "8000"
    volumes:
      - ./patch_files:/app/patches   # 호스트 patch_files ↔ 컨테이너 /app/patches
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: nginx
    restart: always
    ports:
      - "80:80"   # LAN 접근 포트
    volumes:
      - ./patch_files:/app/patches
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fastapi
    networks:
      - app-network

networks:
  app-network:
    driver: bridge